<!DOCTYPE html>
<html lang="es-CO" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada | Tecnovatec</title>
  <meta name="description" content="La página que buscas no existe. Regresa al inicio de Tecnovatec.">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="icon" type="image/png" href="assets/logoTecnovatec.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-8);
    }
    .error-code {
      font-size: clamp(6rem, 15vw, 12rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--color-accent-cyan), var(--color-accent-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0.6;
    }
    .error-title {
      font-size: var(--text-2xl);
      font-weight: 700;
      margin-bottom: var(--space-4);
    }
    .error-desc {
      color: var(--color-text-secondary);
      margin-bottom: var(--space-8);
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div>
      <div class="error-code" aria-hidden="true">404</div>
      <h1 class="error-title">Página no encontrada</h1>
      <p class="error-desc">La página que buscas no existe o ha sido movida. Te invitamos a regresar al inicio y explorar nuestros servicios.</p>
      <a href="/" class="btn btn-primary">Volver al inicio</a>
    </div>
  </div>
</body>
</html>
